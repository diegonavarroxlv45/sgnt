app = "sgnt"
primary_region = "cdg"

[env]
  PORT = "5000"

[processes]
  app = "gunicorn main:app --bind 0.0.0.0:5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1
  processes = ["app"]
  concurrency = { type = "requests", soft_limit = 20, hard_limit = 25 }
  sticky_sessions = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
